# Portable conda/mamba environment for the phylohpc pipeline.
#
# Loosely pinned (direct tools only) so it solves across machines and over time.
# A full `conda env export` pins every transitive package to a build hash and
# fails to resolve on another machine — this spec avoids that.
#
# NOT included: Nextflow + Java, and GeneRax. GeneRax reconciliation
# (`--run_generax`) needs an MPI-compiled GeneRax + mpirun (e.g. HPC
# `module load OpenMPI`); the bioconda GeneRax build is non-MPI and crashes, so
# it is left out. POSSVM ships with the phylogeny/ submodule.
name: phylo
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.10
  # Step 1 — PFAM search + clustering
  - hmmer
  - diamond
  - mcl
  # Step 2 — alignment, trimming, gene trees, orthology
  - mafft
  - clipkit
  - fasttree
  - iqtree
  # Step 4 (ancestral reconstruction) + Python scripts
  - pastml
  - ete3
  - biopython
  - numpy
  - pandas
  # phylogeny/main.py config parsing
  - pyyaml
  # POSSVM (phylogeny submodule): orthology clustering + tree plotting
  - networkx
  - scipy
  - scikit-learn
  - markov_clustering
  - python-louvain
  - matplotlib-base
